<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | EduPortal</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .signup-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #2c3e50; text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* Fixes padding overflow */
        }
        .btn {
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover { background: #2980b9; }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <h2>Student Sign Up</h2>
        <form id="signupForm">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="School Email" required>
            <input type="password" placeholder="Create Password" required>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <a href="index.html" class="back-home">← Back to Homepage</a>
    </div>

    <script>
        document.getElementById('signupForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Account created successfully! (Note: This is a demo; data isn't saved to a database yet.)");
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
